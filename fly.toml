# fly.toml app configuration file generated for yaammoo-backend on 2026-04-15T10:12:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yaammoo-backend'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  count = 1
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
